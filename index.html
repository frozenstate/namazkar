<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Namaz Kar?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/favicon-round.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.svg" />
  <meta name="theme-color" content="#141a22" />
  <script>
    (function () {
      try {
        const savedTheme = localStorage.getItem('theme');
        const shouldDark = savedTheme ? savedTheme === 'dark' : true;
        document.documentElement.classList.toggle('theme-dark', shouldDark);
        document.documentElement.style.colorScheme = shouldDark ? 'dark' : 'light';
      } catch (err) {
        document.documentElement.classList.add('theme-dark');
        document.documentElement.style.colorScheme = 'dark';
      }
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="left">
      <button id="current-date" class="date-toggle" type="button" aria-pressed="false" aria-label="Toggle calendar date"></button>
      <span id="current-time"></span>
    </div>
    <div class="right">
      <button id="notifyGlobal" class="icon-button" type="button" aria-label="Enable notifications" title="Enable notifications">
        <img class="icon-img" src="icons/bell-slash.svg" alt="Notifications" width="20" height="20" />
      </button>
      <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
        <img class="icon-img" src="icons/dark-mode.svg" alt="Dark mode" width="20" height="20" />
      </button>
      <button id="installBtn" class="icon-button hidden" type="button" aria-label="Install app" title="Install app">
        <img class="icon-img" src="icons/install.svg" alt="Install" width="20" height="20" />
      </button>
    </div>
  </header>

  <div class="container">
    <div class="hero">
      <img src="icons/mosque.svg" alt="Namaz Kar Logo" class="logo" />
      <h1>Namaz Kar?</h1>
    </div>

  <div id="toast-container" class="toast-container"></div>

  <div class="region">
    <span id="offset-text" class="offset-text" title="Region offset">+0 min</span>
    <div class="city-picker" id="cityPicker">
      <div class="city-search-wrap">
        <input id="citySearch" class="city-search" type="text" aria-label="Search region" autocomplete="off" placeholder="Search regions" />
        <div id="cityResults" class="city-results" role="listbox" aria-label="Region search results"></div>
      </div>
    </div>
  </div>

  <div id="next-prayer" class="next-card" aria-live="polite">
    <div class="row">
      <strong class="name">Next: <span id="next-name">—</span></strong>
      <span class="time-value"><span id="next-time">--:--</span></span>
    </div>
    <small id="next-countdown">—</small>
  </div>

  <div class="times" id="times" aria-busy="true">
    <p class="times-loading">Loading prayer times...</p>
  </div>

  <div class="settings">
    <p><small>
      Based on the Dar-ul-Uloom Rahimiyyah timetable.
    </small></p>
  </div>
  </div>

  <footer class="page-footer" aria-label="App dedication">
    Lovingly dedicated to my family, whose love, support, and guidance shaped who I am today.
  </footer>

  <script src="persist-storage.js"></script>
  <script src="app.js"></script>
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
